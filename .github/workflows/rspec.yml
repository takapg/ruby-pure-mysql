name: Ruby RSpec Test

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql-real:
        image: mysql:8.0
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
        ports:
          - 3306:3306

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '.ruby-version'
          bundler-cache: true

      - name: Wait for MySQL to be ready
        run: |
          MAX_ATTEMPTS=100
          ATTEMPT_NUM=1
          until mysql -h 127.0.0.1 -u root -e "SELECT version();" > /dev/null 2>&1; do
            if [ $ATTEMPT_NUM -ge $MAX_ATTEMPTS ]; then
              echo "Error: MySQL did not start after $MAX_ATTEMPTS attempts."
              exit 1
            fi
            echo "Waiting for MySQL to start (Attempt: $ATTEMPT_NUM/$MAX_ATTEMPTS)..."
            sleep 0.5
            ATTEMPT_NUM=$((ATTEMPT_NUM + 1))
          done
          echo "MySQL is up and running!"

      - name: Run RuboCop
        run: |
          bundle exec rubocop

      - name: Run RSpec
        run: |
          bundle exec rspec
        env:
          DB_HOST: 127.0.0.1
          DB_USER: root
