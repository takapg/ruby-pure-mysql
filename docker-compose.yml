services:
  mysql-real:
    image: mysql:8.0
    container_name: mysql-real
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 1s
      timeout: 1s
      retries: 20
    tmpfs:
      - /var/lib/mysql
